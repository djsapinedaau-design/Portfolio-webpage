<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4a7c59, #2e5d46);
            text-align: center;
            padding-top: 100px;
            margin: 0;
        }

        .container {
            background-color: white;
            width: 320px;
            margin: auto;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            margin-bottom: 10px;
            color: #2e5d46;
        }

        p {
            margin: 5px 0;
            color: #555;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            background: linear-gradient(135deg, #4a7c59, #3b6147);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #3b6147, #2e5d46);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>WELCOME! My Name is DJ PINEDA</h1>
        <p>BSIT 1 - SOUTH 8</p>

        <a href="Pineda_Dj_Portfolio.pdf" target="_blank">
            <button>View My Portfolio</button>
        </a>
    </div>

</body>
</html>
